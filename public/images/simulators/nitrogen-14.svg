<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-labelledby="title desc">
  <title id="title">Nitrogen-14 atom diagram</title>
  <desc id="desc">A simple diagram of nitrogen-14 showing 7 protons, 7 neutrons, and 7 electrons.</desc>
  <rect width="640" height="480" rx="32" fill="#f8fafc"/>
  <circle cx="320" cy="240" r="168" fill="none" stroke="#cbd5e1" stroke-width="3"/>
  <circle cx="320" cy="240" r="112" fill="none" stroke="#cbd5e1" stroke-width="3"/>

  <g fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
    <text x="320" y="58" font-size="34" font-weight="800">Nitrogen-14</text>
    <text x="320" y="92" font-size="18">7 protons + 7 neutrons</text>
  </g>

  <g stroke="#0f172a" stroke-width="2">
    <circle cx="284" cy="203" r="23" fill="#f97316"/>
    <circle cx="320" cy="200" r="23" fill="#38bdf8"/>
    <circle cx="356" cy="207" r="23" fill="#f97316"/>
    <circle cx="264" cy="239" r="23" fill="#38bdf8"/>
    <circle cx="300" cy="234" r="23" fill="#f97316"/>
    <circle cx="337" cy="239" r="23" fill="#38bdf8"/>
    <circle cx="374" cy="244" r="23" fill="#f97316"/>
    <circle cx="274" cy="276" r="23" fill="#f97316"/>
    <circle cx="311" cy="271" r="23" fill="#38bdf8"/>
    <circle cx="348" cy="277" r="23" fill="#f97316"/>
    <circle cx="384" cy="284" r="23" fill="#38bdf8"/>
    <circle cx="302" cy="310" r="23" fill="#38bdf8"/>
    <circle cx="339" cy="312" r="23" fill="#f97316"/>
    <circle cx="322" cy="255" r="23" fill="#38bdf8"/>
  </g>

  <g fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800" text-anchor="middle" dominant-baseline="central">
    <text x="284" y="203">p+</text>
    <text x="320" y="200">n</text>
    <text x="356" y="207">p+</text>
    <text x="264" y="239">n</text>
    <text x="300" y="234">p+</text>
    <text x="337" y="239">n</text>
    <text x="374" y="244">p+</text>
    <text x="274" y="276">p+</text>
    <text x="311" y="271">n</text>
    <text x="348" y="277">p+</text>
    <text x="384" y="284">n</text>
    <text x="302" y="310">n</text>
    <text x="339" y="312">p+</text>
    <text x="322" y="255">n</text>
  </g>

  <g fill="#2563eb" stroke="#ffffff" stroke-width="4">
    <circle cx="320" cy="128" r="12"/>
    <circle cx="320" cy="352" r="12"/>
    <circle cx="208" cy="240" r="12"/>
    <circle cx="432" cy="240" r="12"/>
    <circle cx="201" cy="121" r="12"/>
    <circle cx="439" cy="121" r="12"/>
    <circle cx="439" cy="359" r="12"/>
  </g>

  <g fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" text-anchor="middle">
    <text x="320" y="441">A stable nitrogen isotope with 7 electrons.</text>
  </g>
</svg>
